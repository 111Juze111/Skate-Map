<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skate Map</title>
  <script src="https://api-maps.yandex.ru/2.1/?apikey=877d3246-7aff-42a0-9fba-f7c2bb0904dd&lang=ru_RU"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { display: flex; flex-direction: column; height: 100vh; }
    #map { flex: 1; }

    .map-btn { position: absolute; z-index: 1000; width: 40px; height: 40px; background: white; border: 2px solid rgba(0,0,0,0.15); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    .map-btn.active { background: #e3f2fd; border-color: #1976d2; }
    #draw-btn.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }
    #filter-btn.active { background: #f3e5f5; border-color: #7b1fa2; }

    .osm-status { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.7); color: white; padding: 5px 14px; border-radius: 20px; font-size: 12px; display: none; white-space: nowrap; }
    .osm-status.show { display: block; }
    .zoom-hint { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.6); color: white; padding: 5px 14px; border-radius: 20px; font-size: 12px; display: none; white-space: nowrap; }
    .zoom-hint.show { display: block; }

    /* ---- Нижняя панель поиска ---- */
    #bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; z-index: 1001; }

    /* Поисковая строка */
    #search-wrap { background: white; border-radius: 14px 14px 0 0; padding: 10px 12px 8px; box-shadow: 0 -2px 12px rgba(0,0,0,0.12); }
    #search-row { display: flex; align-items: center; gap: 8px; }
    #search-input { flex: 1; border: none; background: #f2f2f7; border-radius: 10px; padding: 9px 12px; font-size: 16px; outline: none; }
    #search-clear { border: none; background: none; font-size: 20px; color: #aaa; cursor: pointer; display: none; padding: 0 4px; }

    /* Список результатов */
    #search-results { max-height: 240px; overflow-y: auto; background: white; display: none; }
    .s-item { padding: 11px 14px; border-top: 1px solid #f0f0f0; cursor: pointer; }
    .s-item:active { background: #f5f5f5; }
    .s-name { font-size: 13px; font-weight: 500; color: #1a1a2e; }
    .s-addr { font-size: 11px; color: #999; margin-top: 2px; }

    /* Карточка места */
    #place-card { background: white; border-radius: 14px 14px 0 0; padding: 14px 16px 20px; box-shadow: 0 -2px 12px rgba(0,0,0,0.12); display: none; }
    #place-card.show { display: block; }
    #place-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    #place-name { font-size: 15px; font-weight: 600; color: #1a1a2e; flex: 1; margin-right: 8px; }
    #place-close { font-size: 22px; color: #aaa; cursor: pointer; line-height: 1; }
    #place-addr { font-size: 12px; color: #888; margin-bottom: 14px; }
    #place-route-btn { width: 100%; padding: 11px; background: #1976d2; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; }
    #route-info { font-size: 12px; color: #555; margin-top: 8px; text-align: center; display: none; }

    /* Панель рисования */
    .panel { background: white; border-top: 1px solid #e0e0e0; padding: 10px 14px 12px; flex-shrink: 0; display: none; }
    .panel.show { display: block; }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 7px; }
    .label { font-size: 11px; color: #999; min-width: 62px; font-weight: 500; }
    .chip { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; user-select: none; }
    .chip.sel { border-color: currentColor; }
    .divider { height: 1px; background: #f0f0f0; margin: 3px 0 7px; }
    .hint { font-size: 11px; color: #aaa; margin-bottom: 7px; }
    .buttons { display: flex; gap: 7px; }
    .btn { flex: 1; padding: 9px; border-radius: 9px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; }
    .btn-save { background: #1a1a2e; color: white; }
    .btn-save:disabled { background: #ddd; color: #aaa; cursor: default; }
    .btn-sm { background: #f0f0f0; color: #555; flex: 0 0 auto; padding: 9px 12px; }
    .btn-danger { background: #f0f0f0; color: #c62828; flex: 0 0 auto; padding: 9px 12px; }
    .sync-status { font-size: 10px; margin-top: 5px; text-align: right; }
    .sync-ok { color: #388e3c; } .sync-err { color: #c62828; } .sync-loading { color: #aaa; }

    /* Фильтр */
    .filter-panel { position: absolute; right: 60px; bottom: 160px; z-index: 1002; background: white; border-radius: 12px; padding: 10px 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.18); display: none; min-width: 160px; }
    .filter-panel.show { display: block; }
    .filter-title { font-size: 11px; font-weight: 600; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .filter-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; user-select: none; }
    .filter-item:last-child { margin-bottom: 0; }
    .filter-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
    .filter-label { font-size: 12px; color: #333; }
    .filter-item.off .filter-dot { opacity: 0.25; }
    .filter-item.off .filter-label { opacity: 0.35; text-decoration: line-through; }

    /* Edit popup */
    .edit-popup { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 2px solid #e0e0e0; padding: 14px 16px 20px; z-index: 9999; transform: translateY(100%); transition: transform 0.2s ease; }
    .edit-popup.open { transform: translateY(0); }
    .edit-title { font-size: 13px; font-weight: 500; color: #1a1a2e; margin-bottom: 10px; display: flex; justify-content: space-between; }
    .edit-close { font-size: 22px; color: #aaa; cursor: pointer; }
    .edit-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .edit-btns { display: flex; gap: 8px; margin-top: 10px; }
    .edit-btn { flex: 1; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
    .edit-save { background: #1a1a2e; color: white; }
    .edit-delete { background: #ffebee; color: #c62828; flex: 0 0 auto; padding: 10px 14px; }
    .edit-cancel { background: #f0f0f0; color: #555; flex: 0 0 auto; padding: 10px 14px; }
  </style>
</head>
<body>
<div id="map"></div>

<div class="osm-status" id="osm-status">Загружаю покрытия...</div>
<div class="zoom-hint" id="zoom-hint">Приблизь карту чтобы увидеть покрытия</div>

<!-- Кнопки справа -->
<button class="map-btn" id="locate-btn" style="position:absolute;bottom:160px;right:12px;">🛹</button>
<button class="map-btn" id="draw-btn"   style="position:absolute;bottom:208px;right:12px;">✏️</button>
<button class="map-btn" id="filter-btn" style="position:absolute;bottom:256px;right:12px;">🎨</button>

<!-- Фильтр -->
<div class="filter-panel" id="filter-panel">
  <div class="filter-title">Фильтр покрытий</div>
</div>

<!-- Панель рисования (над нижней панелью) -->
<div class="panel" id="draw-panel">
  <div class="hint" id="hint">Кликай на карте чтобы нарисовать участок</div>
  <div class="row">
    <span class="label">Покрытие</span>
    <div id="cs" style="display:flex;gap:5px;flex-wrap:wrap;"></div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <span class="label">Качество</span>
    <div id="cq" style="display:flex;gap:5px;flex-wrap:wrap;"></div>
  </div>
  <div class="buttons">
    <button class="btn btn-sm" id="btn-undo">↩</button>
    <button class="btn btn-save" id="btn-save" disabled>Сохранить</button>
    <button class="btn btn-danger" id="btn-cancel">✕</button>
  </div>
  <div class="sync-status" id="sync-status"></div>
</div>

<!-- Нижняя панель: поиск + карточка места -->
<div id="bottom-bar">
  <!-- Карточка найденного места -->
  <div id="place-card">
    <div id="place-card-header">
      <div id="place-name"></div>
      <span id="place-close">×</span>
    </div>
    <div id="place-addr"></div>
    <button id="place-route-btn">🛹 Маршрут сюда</button>
    <div id="route-info"></div>
  </div>
  <!-- Строка поиска -->
  <div id="search-wrap">
    <div id="search-row">
      <input id="search-input" type="text" placeholder="🔍 Поиск места или адреса..." autocomplete="off" />
      <button id="search-clear">×</button>
    </div>
    <div id="search-results"></div>
  </div>
</div>

<!-- Edit popup -->
<div class="edit-popup" id="edit-popup">
  <div class="edit-title">
    <span>Редактировать участок</span>
    <span class="edit-close" id="edit-close">×</span>
  </div>
  <div class="edit-row">
    <span class="label">Покрытие</span>
    <div id="ecs" style="display:flex;gap:5px;flex-wrap:wrap;"></div>
  </div>
  <div class="divider"></div>
  <div class="edit-row">
    <span class="label">Качество</span>
    <div id="ecq" style="display:flex;gap:5px;flex-wrap:wrap;"></div>
  </div>
  <div class="edit-btns">
    <button class="edit-btn edit-delete" id="edit-delete">🗑 Удалить</button>
    <button class="edit-btn edit-cancel" id="edit-cancel-btn">Отмена</button>
    <button class="edit-btn edit-save" id="edit-save">✓ Сохранить</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://rjpsqxcvvqxcglzmfsqb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqcHNxeGN2dnF4Y2dsem1mc3FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTk1MDksImV4cCI6MjA5NTA5NTUwOX0.WP1-DQcrBiPKFRtdAlairDAtaudRng6KBBZwAXMjTeM';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const SURFACES = [
  { id:'asphalt',  label:'Асфальт',   color:'#388e3c', bg:'#e8f5e9', text:'#1b5e20' },
  { id:'tile',     label:'Плитка',    color:'#1976d2', bg:'#e3f2fd', text:'#0d47a1' },
  { id:'cobble',   label:'Брусчатка', color:'#f57c00', bg:'#fff3e0', text:'#bf360c' },
  { id:'gravel',   label:'Гравий',    color:'#c62828', bg:'#ffebee', text:'#b71c1c' },
  { id:'dirt',     label:'Грунт',     color:'#6d4c41', bg:'#efebe9', text:'#4e342e' },
  { id:'concrete', label:'Бетон',     color:'#546e7a', bg:'#eceff1', text:'#37474f' },
];
const QUALITY = [
  { id:'good', label:'😊 Норм',   width:6, opacity:0.85, dash:null,  bg:'#e8f5e9', text:'#1b5e20' },
  { id:'mid',  label:'😐 Средне', width:4, opacity:0.7,  dash:'8 5', bg:'#fff3e0', text:'#bf360c' },
  { id:'bad',  label:'😬 Плохо',  width:3, opacity:0.6,  dash:'3 7', bg:'#ffebee', text:'#b71c1c' },
];

const surf = id => SURFACES.find(x=>x.id===id);
const qual = id => QUALITY.find(x=>x.id===id);

const OSM_SURFACE_MAP = {
  asphalt:'asphalt', paved:'asphalt', tarmac:'asphalt',
  concrete:'concrete', 'concrete:plates':'concrete',
  paving_stones:'tile', sett:'cobble', cobblestone:'cobble', unhewn_cobblestone:'cobble',
  gravel:'gravel', fine_gravel:'gravel', compacted:'gravel', pebblestone:'gravel',
  dirt:'dirt', ground:'dirt', grass:'dirt', earth:'dirt', mud:'dirt', unpaved:'dirt', sand:'dirt',
};
function osmSurfId(s) { return OSM_SURFACE_MAP[s]||null; }

function polyStyle(sId, qId) {
  const s=surf(sId), q=qual(qId);
  const opts={strokeColor:s.color, strokeWidth:q.width, strokeOpacity:q.opacity};
  if(q.dash) opts.strokeStyle=q.dash;
  return opts;
}

let activeFilters=new Set(SURFACES.map(s=>s.id));
let osmPolylines=[], segments=[];
let ymap, drawMode=false, surface='asphalt', quality='good';
let pts=[], dotMarkers=[], previewPoly=null;
let locationMark=null, firstFix=true;
let loadedKeys=new Set(), isLoadingOSM=false, osmTimer=null;
let searchMark=null, currentRouteObj=null, currentPlaceCoords=null;
let searchTimer=null;

// ---- Фильтры ----
const filterPanel=document.getElementById('filter-panel');
SURFACES.forEach(s=>{
  const item=document.createElement('div');
  item.className='filter-item';
  item.innerHTML='<div class="filter-dot" style="background:'+s.color+';"></div><div class="filter-label">'+s.label+'</div>';
  item.onclick=()=>{
    if(activeFilters.has(s.id)){activeFilters.delete(s.id);item.classList.add('off');}
    else{activeFilters.add(s.id);item.classList.remove('off');}
    applyFilters();
  };
  filterPanel.appendChild(item);
});
document.getElementById('filter-btn').onclick=()=>{
  const open=filterPanel.classList.contains('show');
  filterPanel.classList.toggle('show',!open);
  document.getElementById('filter-btn').classList.toggle('active',!open);
};
document.addEventListener('click',e=>{
  if(!filterPanel.contains(e.target)&&e.target.id!=='filter-btn'){
    filterPanel.classList.remove('show');
    document.getElementById('filter-btn').classList.remove('active');
  }
});
function applyFilters(){
  osmPolylines.forEach(({poly,surfaceId})=>{
    try{if(activeFilters.has(surfaceId))ymap.geoObjects.add(poly);else ymap.geoObjects.remove(poly);}catch(e){}
  });
  segments.forEach(seg=>{
    try{if(activeFilters.has(seg.surface))ymap.geoObjects.add(seg.poly);else ymap.geoObjects.remove(seg.poly);}catch(e){}
  });
}

function buildChips(elId,items,getV,setV,onChange){
  const el=document.getElementById(elId);el.innerHTML='';
  items.forEach(s=>{
    const d=document.createElement('div');
    d.className='chip'+(s.id===getV()?' sel':'');
    d.style.cssText='background:'+s.bg+';color:'+s.text+';';
    d.textContent=s.label;
    d.onclick=()=>{setV(s.id);el.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));d.classList.add('sel');if(onChange)onChange();};
    el.appendChild(d);
  });
}
function setSync(msg,cls){const el=document.getElementById('sync-status');el.textContent=msg;el.className='sync-status '+cls;}
function updateHint(){
  const el=document.getElementById('hint');
  if(!pts.length)el.textContent='Кликай на карте чтобы нарисовать участок';
  else if(pts.length===1)el.textContent='Ещё одна точка — и линия появится';
  else el.textContent='Точек: '+pts.length+' — добавляй ещё или сохраняй';
}
function updateZoomHint(){
  if(!ymap)return;
  document.getElementById('zoom-hint').className='zoom-hint'+(ymap.getZoom()<15?' show':'');
}

// ---- Поиск ----
const searchInput=document.getElementById('search-input');
const searchResults=document.getElementById('search-results');
const searchClear=document.getElementById('search-clear');

searchInput.addEventListener('input',()=>{
  const q=searchInput.value.trim();
  searchClear.style.display=q?'block':'none';
  clearTimeout(searchTimer);
  if(q.length<2){searchResults.style.display='none';return;}
  searchTimer=setTimeout(()=>doSearch(q),400);
});

searchInput.addEventListener('focus',()=>{
  if(searchInput.value.trim().length>=2) searchResults.style.display='block';
  // Скрыть карточку места при фокусе на поиск
  hidePlaceCard();
});

searchClear.onclick=()=>{
  searchInput.value='';
  searchClear.style.display='none';
  searchResults.style.display='none';
  searchResults.innerHTML='';
  if(searchMark){ymap.geoObjects.remove(searchMark);searchMark=null;}
  hidePlaceCard();
};

async function doSearch(query){
  if(!ymap)return;
  try{
    const res=await ymaps.geocode(query+", Минск", {results:6});
    const items=res.geoObjects.toArray();
    searchResults.innerHTML='';
    if(!items.length){
      searchResults.innerHTML='<div class="s-item"><div class="s-name">Ничего не найдено</div></div>';
    } else {
      items.forEach(obj=>{
        const name=obj.properties.get('name')||obj.getAddressLine()||'';
        const addr=obj.properties.get('description')||'';
        const div=document.createElement('div');
        div.className='s-item';
        div.innerHTML='<div class="s-name">'+name+'</div>'+(addr&&addr!==name?'<div class="s-addr">'+addr+'</div>':'');
        div.onclick=()=>{
          const coords=obj.geometry.getCoordinates();
          selectPlace(coords, name, addr||name);
          searchResults.style.display='none';
          searchInput.value='';
          searchInput.blur();
        };
        searchResults.appendChild(div);
      });
    }
    searchResults.style.display='block';
  }catch(e){console.error(e);}
}

function selectPlace(coords, name, addr){
  ymap.setCenter(coords,17,{duration:400});
  if(searchMark)ymap.geoObjects.remove(searchMark);
  searchMark=new ymaps.Placemark(coords,{},{preset:'islands#redDotIcon',zIndex:900});
  ymap.geoObjects.add(searchMark);
  currentPlaceCoords=coords;
  // Показать карточку
  document.getElementById('place-name').textContent=name;
  document.getElementById('place-addr').textContent=addr!==name?addr:'';
  document.getElementById('route-info').style.display='none';
  document.getElementById('route-info').textContent='';
  document.getElementById('place-card').classList.add('show');
}

function hidePlaceCard(){
  document.getElementById('place-card').classList.remove('show');
  document.getElementById('route-info').style.display='none';
  if(currentRouteObj){ymap.geoObjects.remove(currentRouteObj);currentRouteObj=null;}
}

document.getElementById('place-close').onclick=()=>{
  hidePlaceCard();
  if(searchMark){ymap.geoObjects.remove(searchMark);searchMark=null;}
  currentPlaceCoords=null;
};

// ---- Маршрут из текущей позиции ----
document.getElementById('place-route-btn').onclick=async()=>{
  if(!currentPlaceCoords){return;}
  const routeInfo=document.getElementById('route-info');
  routeInfo.textContent='Строю маршрут...';
  routeInfo.style.display='block';
  try{
    if(currentRouteObj){ymap.geoObjects.remove(currentRouteObj);currentRouteObj=null;}
    let from;
    if(locationMark){
      from=locationMark.geometry.getCoordinates();
    } else {
      from=ymap.getCenter();
    }
    const result=await ymaps.route([from, currentPlaceCoords],{
      routingMode:'pedestrian',
      mapStateAutoApply:true
    });
    currentRouteObj=result;
    ymap.geoObjects.add(currentRouteObj);
    const dist=(result.getLength()/1000).toFixed(1);
    const time=Math.round(result.getTime()/60);
    routeInfo.textContent=dist+' км · ~'+time+' мин пешком';
  }catch(e){
    routeInfo.textContent='Не удалось построить маршрут';
  }
};

// ---- Инициализация карты ----
ymaps.ready(function(){
  ymap=new ymaps.Map('map',{
    center:[53.902,27.562],
    zoom:13,
    controls:[]
  },{suppressMapOpenBlock:true});

  // Double-tap drag zoom
  (function(){
    const mapEl=document.getElementById('map');
    let lastTap=0,isDragging=false,startY=null,startZoom=null;
    mapEl.addEventListener('touchstart',function(e){
      if(e.touches.length!==1){isDragging=false;return;}
      const now=Date.now(),touch=e.touches[0];
      if(now-lastTap<300){e.preventDefault();isDragging=true;startY=touch.clientY;startZoom=ymap.getZoom();}
      lastTap=now;
    },{passive:false});
    mapEl.addEventListener('touchmove',function(e){
      if(!isDragging||e.touches.length!==1)return;
      e.preventDefault();
      const dy=startY-e.touches[0].clientY;
      ymap.setZoom(Math.max(2,Math.min(19,startZoom+dy/60)),{smooth:false,checkZoomRange:true});
    },{passive:false});
    mapEl.addEventListener('touchend',()=>{isDragging=false;});
  })();

  ymap.events.add('click',function(e){
    if(!drawMode)return;
    if(document.getElementById('edit-popup').classList.contains('open'))return;
    addDrawPoint(e.get('coords'));
  });

  ymap.events.add('boundschange',function(){
    updateZoomHint();
    clearTimeout(osmTimer);
    osmTimer=setTimeout(loadOSMSurfaces,800);
  });

  buildChips('cs',SURFACES,()=>surface,v=>{surface=v;redrawPreview();});
  buildChips('cq',QUALITY, ()=>quality, v=>{quality=v;redrawPreview();});

  updateHint();updateZoomHint();
  loadSegments();loadOSMSurfaces();startTracking();
});

// ---- Геолокация ----
function startTracking(){
  if(!navigator.geolocation)return;
  document.getElementById('locate-btn').classList.add('active');
  navigator.geolocation.watchPosition(
    pos=>{
      const ll=[pos.coords.latitude,pos.coords.longitude];
      if(!locationMark){
        locationMark=new ymaps.Placemark(ll,{},{
          iconLayout:'default#image',
          iconImageHref:'data:image/svg+xml;charset=utf-8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36"><text y="30" font-size="30">🛹</text></svg>'),
          iconImageSize:[36,36],iconImageOffset:[-18,-30],zIndex:1000
        });
        ymap.geoObjects.add(locationMark);
      } else {locationMark.geometry.setCoordinates(ll);}
      if(firstFix){ymap.setCenter(ll,17);firstFix=false;loadOSMSurfaces();}
    },
    ()=>document.getElementById('locate-btn').classList.remove('active'),
    {enableHighAccuracy:true,maximumAge:5000,timeout:10000}
  );
}
document.getElementById('locate-btn').onclick=()=>{
  if(locationMark)ymap.setCenter(locationMark.geometry.getCoordinates(),17);
  else startTracking();
};

// ---- OSM ----
async function loadOSMSurfaces(){
  if(!ymap||ymap.getZoom()<15||isLoadingOSM)return;
  const b=ymap.getBounds();
  const key=[b[0][0].toFixed(3),b[0][1].toFixed(3),b[1][0].toFixed(3),b[1][1].toFixed(3)].join(',');
  if(loadedKeys.has(key))return;
  isLoadingOSM=true;
  document.getElementById('osm-status').className='osm-status show';
  const bbox=b[0][0]+','+b[0][1]+','+b[1][0]+','+b[1][1];
  const query='[out:json][timeout:25];(way[highway~"^(footway|path|cycleway|pedestrian|living_street|track)$"][surface]('+bbox+'););out geom;';
  try{
    const res=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(query)});
    const data=await res.json();
    data.elements.forEach(way=>{
      if(!way.geometry)return;
      const sid=osmSurfId(way.tags?.surface);
      if(!sid)return;
      const coords=way.geometry.map(p=>[p.lat,p.lon]);
      const poly=new ymaps.Polyline(coords,{},polyStyle(sid,'good'));
      if(activeFilters.has(sid))ymap.geoObjects.add(poly);
      osmPolylines.push({poly,surfaceId:sid});
    });
    loadedKeys.add(key);
  }catch(e){console.error(e);}
  isLoadingOSM=false;
  document.getElementById('osm-status').className='osm-status';
}

// ---- Рисование ----
document.getElementById('draw-btn').onclick=()=>{
  drawMode=!drawMode;
  document.getElementById('draw-btn').classList.toggle('active',drawMode);
  document.getElementById('draw-panel').classList.toggle('show',drawMode);
  if(!drawMode)cancelDraw();
};

function addDrawPoint(coord){
  pts.push(coord);
  const dot=new ymaps.Placemark(coord,{},{
    iconLayout:'default#image',
    iconImageHref:'data:image/svg+xml;charset=utf-8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10"><circle cx="5" cy="5" r="4" fill="'+surf(surface).color+'" stroke="white" stroke-width="1.5"/></svg>'),
    iconImageSize:[10,10],iconImageOffset:[-5,-5]
  });
  ymap.geoObjects.add(dot);dotMarkers.push(dot);
  redrawPreview();
  document.getElementById('btn-save').disabled=pts.length<2;
  updateHint();
}

function redrawPreview(){
  if(previewPoly){ymap.geoObjects.remove(previewPoly);previewPoly=null;}
  if(pts.length>=2){
    previewPoly=new ymaps.Polyline(pts,{},{...polyStyle(surface,quality),strokeOpacity:0.5});
    ymap.geoObjects.add(previewPoly);
  }
}

function cancelDraw(){
  pts=[];dotMarkers.forEach(m=>ymap.geoObjects.remove(m));dotMarkers=[];
  if(previewPoly){ymap.geoObjects.remove(previewPoly);previewPoly=null;}
  document.getElementById('btn-save').disabled=true;
  updateHint();
}

document.getElementById('btn-undo').onclick=()=>{
  if(!pts.length)return;
  pts.pop();const m=dotMarkers.pop();if(m)ymap.geoObjects.remove(m);
  redrawPreview();
  document.getElementById('btn-save').disabled=pts.length<2;
  updateHint();
};
document.getElementById('btn-cancel').onclick=cancelDraw;

document.getElementById('btn-save').onclick=async()=>{
  if(pts.length<2)return;
  const ptsData=pts.map(p=>({lat:p[0],lng:p[1]}));
  setSync('Сохраняю...','sync-loading');
  const{data,error}=await db.from('segments').insert([{pts:ptsData,surface,quality}]).select();
  if(error){setSync('Ошибка','sync-err');return;}
  const seg={id:data[0].id,pts:ptsData,surface,quality};
  if(previewPoly){ymap.geoObjects.remove(previewPoly);previewPoly=null;}
  seg.poly=new ymaps.Polyline(pts.slice(),{},polyStyle(surface,quality));
  if(activeFilters.has(surface))ymap.geoObjects.add(seg.poly);
  attachClick(seg);segments.push(seg);
  dotMarkers.forEach(m=>ymap.geoObjects.remove(m));dotMarkers=[];pts=[];
  document.getElementById('btn-save').disabled=true;
  setSync('✓ Сохранено','sync-ok');
  updateHint();
};

// ---- Редактирование ----
let editSeg=null,editOrigSurf=null,editOrigQual=null;
function attachClick(seg){
  seg.poly.events.add('click',function(e){
    e.stopPropagation();if(drawMode)return;openEdit(seg);
  });
}
function openEdit(seg){
  editSeg=seg;editOrigSurf=seg.surface;editOrigQual=seg.quality;
  buildChips('ecs',SURFACES,()=>editSeg.surface,v=>{editSeg.surface=v;editSeg.poly.options.set(polyStyle(editSeg.surface,editSeg.quality));});
  buildChips('ecq',QUALITY, ()=>editSeg.quality, v=>{editSeg.quality=v;editSeg.poly.options.set(polyStyle(editSeg.surface,editSeg.quality));});
  document.getElementById('edit-popup').classList.add('open');
}
function closeEdit(revert){
  if(revert&&editSeg){editSeg.surface=editOrigSurf;editSeg.quality=editOrigQual;editSeg.poly.options.set(polyStyle(editOrigSurf,editOrigQual));}
  editSeg=null;document.getElementById('edit-popup').classList.remove('open');
}
document.getElementById('edit-close').onclick=()=>closeEdit(true);
document.getElementById('edit-cancel-btn').onclick=()=>closeEdit(true);
document.getElementById('edit-save').onclick=async()=>{
  if(!editSeg)return;
  await db.from('segments').update({surface:editSeg.surface,quality:editSeg.quality}).eq('id',editSeg.id);
  closeEdit(false);
};
document.getElementById('edit-delete').onclick=async()=>{
  if(!editSeg)return;
  await db.from('segments').delete().eq('id',editSeg.id);
  ymap.geoObjects.remove(editSeg.poly);
  segments=segments.filter(s=>s!==editSeg);
  closeEdit(false);
};

async function loadSegments(){
  const{data,error}=await db.from('segments').select('*');
  if(error)return;
  data.forEach(row=>{
    const coords=row.pts.map(p=>[p.lat,p.lng]);
    const seg={id:row.id,pts:row.pts,surface:row.surface,quality:row.quality};
    seg.poly=new ymaps.Polyline(coords,{},polyStyle(row.surface,row.quality));
    if(activeFilters.has(row.surface))ymap.geoObjects.add(seg.poly);
    attachClick(seg);segments.push(seg);
  });
}
</script>
